<!DOCTYPE html>
<html>
  <head>
    <title>Interactive Tree Visualization</title>
    <style>
      .container {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 2rem;
        padding: 2rem;
        font-family: Arial, sans-serif;
      }

      .controls {
        padding: 1rem;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      .tree-container {
        display: flex;
        gap: 2rem;
      }

      .visualization {
        flex: 1;
        padding: 1rem;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      .node {
        padding: 0.5rem;
        margin: 0.5rem 0;
        background: #e3f2fd;
        border: 1px solid #90caf9;
        border-radius: 4px;
        cursor: pointer;
      }

      .node.active {
        background: #90caf9;
        border-color: #2196f3;
      }

      .edge {
        margin-left: 2rem;
        padding: 0.25rem;
        color: #666;
        border-left: 2px solid #90caf9;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
      }

      input,
      select {
        width: 100%;
        padding: 0.5rem;
        margin-bottom: 0.5rem;
      }

      button {
        width: 100%;
        padding: 0.5rem;
        background: #2196f3;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-bottom: 0.5rem;
      }

      button:hover {
        background: #1976d2;
      }

      .error {
        color: red;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="controls">
        <h3>Tree Controls</h3>

        <div class="form-group">
          <label>Add Node</label>
          <input type="text" id="nodeName" placeholder="Node name" />
          <select id="parentNode">
            <option value="root">Root</option>
          </select>
          <input type="text" id="edgeLabel" placeholder="Edge label" />
          <button onclick="addNode()">Add Node</button>
        </div>

        <div class="form-group">
          <label>Remove Node</label>
          <select id="nodeToRemove">
            <option value="">Select node</option>
          </select>
          <button onclick="removeNode()">Remove Node</button>
        </div>

        <div class="form-group">
          <button onclick="resetTree()">Reset Tree</button>
        </div>

        <div id="error" class="error"></div>
      </div>

      <div class="tree-container">
        <div class="visualization">
          <h3>Full Tree (click nodes to set active)</h3>
          <div id="fullTree"></div>
        </div>
        <div class="visualization">
          <h3>Active Path</h3>
          <div id="activePath"></div>
        </div>
      </div>
    </div>

    <script src="../js/conversation.js"></script>
    <script>
      let root = new TreeNode("Root");
      let nodeMap = new Map();
      nodeMap.set("root", root);

      function updateNodeSelects() {
        const parentSelect = document.getElementById("parentNode");
        const removeSelect = document.getElementById("nodeToRemove");

        // Save current selections
        const parentValue = parentSelect.value;
        const removeValue = removeSelect.value;

        // Clear current options
        parentSelect.innerHTML = '<option value="root">Root</option>';
        removeSelect.innerHTML = '<option value="">Select node</option>';

        // Add all nodes to selects
        nodeMap.forEach((node, id) => {
          if (id !== "root") {
            const parentOpt = document.createElement("option");
            parentOpt.value = id;
            parentOpt.textContent = node.html;
            parentSelect.appendChild(parentOpt);

            const removeOpt = document.createElement("option");
            removeOpt.value = id;
            removeOpt.textContent = node.html;
            removeSelect.appendChild(removeOpt);
          }
        });

        // Restore selections if they still exist
        if (
          [...parentSelect.options].some((opt) => opt.value === parentValue)
        ) {
          parentSelect.value = parentValue;
        }
        if (
          [...removeSelect.options].some((opt) => opt.value === removeValue)
        ) {
          removeSelect.value = removeValue;
        }
      }

      function addNode() {
        const nodeName = document.getElementById("nodeName").value;
        const parentId = document.getElementById("parentNode").value;
        const edgeLabel = document.getElementById("edgeLabel").value || "→";
        const error = document.getElementById("error");

        if (!nodeName) {
          error.textContent = "Please enter a node name";
          return;
        }

        const parent = nodeMap.get(parentId);
        if (!parent) {
          error.textContent = "Parent node not found";
          return;
        }

        const newNode = new TreeNode(nodeName);
        const nodeId = nodeName.toLowerCase().replace(/\s+/g, "_");

        if (nodeMap.has(nodeId)) {
          error.textContent = "Node with this name already exists";
          return;
        }

        parent.addChild(newNode, edgeLabel);
        nodeMap.set(nodeId, newNode);

        error.textContent = "";
        document.getElementById("nodeName").value = "";
        document.getElementById("edgeLabel").value = "";

        updateNodeSelects();
        updateVisualizations();
      }

      function removeNode() {
        const nodeId = document.getElementById("nodeToRemove").value;
        const error = document.getElementById("error");

        if (!nodeId) {
          error.textContent = "Please select a node to remove";
          return;
        }

        const node = nodeMap.get(nodeId);
        if (!node) {
          error.textContent = "Node not found";
          return;
        }

        const parent = findParentNode(root, node);
        if (parent) {
          parent.removeChild(node);
          nodeMap.delete(nodeId);
          error.textContent = "";
          updateNodeSelects();
          updateVisualizations();
        }
      }

      function resetTree() {
        root = new TreeNode("Root");
        nodeMap.clear();
        nodeMap.set("root", root);
        updateNodeSelects();
        updateVisualizations();
      }

      // Helper function to create DOM elements for the tree
      function createTreeDOM(node, isActivePath = false) {
        const container = document.createElement("div");

        const nodeDiv = document.createElement("div");
        nodeDiv.className = "node" + (isActivePath ? " active" : "");
        nodeDiv.textContent = node.html;

        nodeDiv.onclick = (e) => {
          e.stopPropagation();
          const parent = findParentNode(root, node);
          if (parent) {
            parent.setActiveChild(node);
            updateVisualizations();
          }
        };

        container.appendChild(nodeDiv);

        const children = node.getChildren();
        children.forEach((child) => {
          const edgeDiv = document.createElement("div");
          edgeDiv.className = "edge";
          edgeDiv.textContent = node.getEdge(child).html;
          container.appendChild(edgeDiv);

          const childContainer = createTreeDOM(
            child,
            isActivePath && node.getActiveChild() === child
          );
          container.appendChild(childContainer);
        });

        return container;
      }

      function findParentNode(current, target) {
        for (const child of current.getChildren()) {
          if (child === target) return current;
          const found = findParentNode(child, target);
          if (found) return found;
        }
        return null;
      }

      function updateVisualizations() {
        const fullTreeContainer = document.getElementById("fullTree");
        const activePathContainer = document.getElementById("activePath");

        fullTreeContainer.innerHTML = "";
        activePathContainer.innerHTML = "";

        fullTreeContainer.appendChild(createTreeDOM(root));
        activePathContainer.appendChild(createTreeDOM(root, true));
      }

      // Initial setup
      updateNodeSelects();
      updateVisualizations();
    </script>
  </body>
</html>
