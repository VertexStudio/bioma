<!DOCTYPE html>
<html>
  <head>
    <title>Tree Visualization Demo</title>
    <style>
      .tree-container {
        display: flex;
        gap: 2rem;
        padding: 2rem;
        font-family: Arial, sans-serif;
      }

      .visualization {
        flex: 1;
        padding: 1rem;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      .node {
        padding: 0.5rem;
        margin: 0.5rem 0;
        background: #e3f2fd;
        border: 1px solid #90caf9;
        border-radius: 4px;
        cursor: pointer;
      }

      .node.active {
        background: #90caf9;
        border-color: #2196f3;
      }

      .edge {
        margin-left: 2rem;
        padding: 0.25rem;
        color: #666;
        border-left: 2px solid #90caf9;
      }

      pre {
        white-space: pre-wrap;
        background: #f5f5f5;
        padding: 1rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="tree-container">
      <div class="visualization">
        <h3>Full Tree (click nodes to set active)</h3>
        <div id="fullTree"></div>
      </div>
      <div class="visualization">
        <h3>Active Path</h3>
        <div id="activePath"></div>
      </div>
    </div>

    <script src="../js/conversation.js"></script>
    <script>
      // Create a sample tree
      const root = new TreeNode("Root");
      const A = new TreeNode("Branch A");
      const B = new TreeNode("Branch B");
      const C = new TreeNode("Branch C");

      root.addChild(A, "→ to A");
      root.addChild(B, "→ to B");
      root.addChild(C, "→ to C");

      const A1 = new TreeNode("A1");
      const A2 = new TreeNode("A2");
      A.addChild(A1, "→ to A1");
      A.addChild(A2, "→ to A2");

      const B1 = new TreeNode("B1");
      const B2 = new TreeNode("B2");
      B.addChild(B1, "→ to B1");
      B.addChild(B2, "→ to B2");

      // Helper function to create DOM elements for the tree
      function createTreeDOM(node, isActivePath = false) {
        const container = document.createElement("div");

        const nodeDiv = document.createElement("div");
        nodeDiv.className = "node" + (isActivePath ? " active" : "");
        nodeDiv.textContent = node.html;

        // Add click handler to set active child
        nodeDiv.onclick = (e) => {
          e.stopPropagation();
          const parent = findParentNode(root, node);
          if (parent) {
            parent.setActiveChild(node);
            updateVisualizations();
          }
        };

        container.appendChild(nodeDiv);

        const children = node.getChildren();
        children.forEach((child) => {
          const edgeDiv = document.createElement("div");
          edgeDiv.className = "edge";
          edgeDiv.textContent = node.getEdge(child).html;
          container.appendChild(edgeDiv);

          const childContainer = createTreeDOM(
            child,
            isActivePath && node.getActiveChild() === child
          );
          container.appendChild(childContainer);
        });

        return container;
      }

      // Helper function to find parent node
      function findParentNode(current, target) {
        for (const child of current.getChildren()) {
          if (child === target) return current;
          const found = findParentNode(child, target);
          if (found) return found;
        }
        return null;
      }

      // Function to update both visualizations
      function updateVisualizations() {
        const fullTreeContainer = document.getElementById("fullTree");
        const activePathContainer = document.getElementById("activePath");

        fullTreeContainer.innerHTML = "";
        activePathContainer.innerHTML = "";

        fullTreeContainer.appendChild(createTreeDOM(root));
        activePathContainer.appendChild(createTreeDOM(root, true));
      }

      // Initial render
      updateVisualizations();
    </script>
  </body>
</html>
