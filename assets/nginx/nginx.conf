events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream minio_upstream {
        server minio:9001;
        keepalive 32;
    }

    server {
        listen 80;
        client_max_body_size 0;
        proxy_buffering off;
        proxy_request_buffering off;

        # Global proxy settings
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Global security headers removal
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header Strict-Transport-Security;

        # Global security headers
        add_header X-Frame-Options "ALLOWALL" always;
        add_header Content-Security-Policy "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src * ws: wss:; frame-ancestors * file://* http://localhost:* https://localhost:*;" always;

        # WebSocket handling
        location /ws/ {
            proxy_pass http://minio_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 36000s;
            proxy_send_timeout 36000s;
        }

        # API handling
        location /api/ {
            proxy_pass http://minio_upstream;
            proxy_http_version 1.1;
            
            # Cookie handling
            proxy_cookie_path / "/";
            proxy_cookie_domain minio $host;
            proxy_set_header Cookie $http_cookie;
        }

        # Default location
        location / {
            proxy_pass http://minio_upstream;
            proxy_http_version 1.1;

            # Cookie handling
            proxy_cookie_path / "/";
            proxy_cookie_domain minio $host;
            proxy_set_header Cookie $http_cookie;
        }
    }
}